<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#16324f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Massing" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>Massing — IFC-native AEC platform</title>
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <button id="rail-toggle" title="Toggle panel (\\)" aria-label="Toggle panel">☰</button>
        <strong style="display:inline-flex;align-items:center;gap:7px"><img src="/favicon.svg" alt="" width="20" height="20" style="border-radius:5px" />Massing</strong>
        <div id="open-menu" class="menu"></div>
        <div id="save-menu" class="menu"></div>
        <input id="ifc-input" type="file" accept=".ifc" hidden />
        <input id="frag-input" type="file" accept=".frag" hidden />
        <input id="convert-input" type="file" accept=".rvt,.dwg,.nwc" hidden />
        <input id="ref-input" type="file" accept=".obj,.stl,.ply,.gltf,.glb,.pcd,.xyz,.las,.laz,.e57,.geojson,.json,.tif,.tiff,.gml,.citygml,.splat,.ksplat" hidden />
        <div id="workspaces" role="tablist" aria-label="Workspace"></div>
        <span class="grow"></span>
        <label id="persona-wrap" title="Gear the workspace to your role — every screen leads with what your job needs (all data stays reachable)">
          <span id="persona-lead" aria-hidden="true">👤 Viewing as</span>
          <select id="persona" aria-label="Role — gear the workspace to your role">
            <optgroup label="Real estate">
              <option value="developer">Developer</option>
            </optgroup>
            <optgroup label="Construction — office">
              <option value="gc">General Contractor</option>
              <option value="project_manager">Project Manager</option>
            </optgroup>
            <optgroup label="Construction — field">
              <option value="superintendent">Superintendent</option>
              <option value="subcontractor">Subcontractor</option>
            </optgroup>
            <optgroup label="Design">
              <option value="architect">Architect</option>
              <option value="engineer">Engineer</option>
            </optgroup>
            <option value="all">All roles (everything)</option>
          </select>
        </label>
        <span id="status" role="status" aria-live="polite">ready</span>
      </header>

      <main id="stage">
        <!-- MODEL workspace: icon rail + slide-out panel + viewport + contextual props -->
        <section id="ws-model" class="workspace active">
          <nav id="rail" aria-label="Model panels"></nav>
          <aside id="rail-panel">
            <div id="panel-tree" class="rpanel active"></div>
            <div id="panel-layers" class="rpanel"></div>
            <div id="panel-issues" class="rpanel"></div>
            <div id="panel-tools" class="rpanel"></div>
          </aside>
          <div id="container">
            <div id="viewer-tools"></div>
          </div>
          <aside id="props" hidden>
            <div id="props-head">
              <h3>Properties</h3>
              <button id="props-close" title="Close (Esc)" aria-label="Close properties">✕</button>
            </div>
            <div id="props-body"></div>
          </aside>
        </section>

        <!-- DRAWINGS workspace: 2D sheet set (plans / elevations / sections) -->
        <section id="ws-drawings" class="workspace">
          <div id="panel-drawings" class="fullpanel active"></div>
        </section>

        <!-- DESIGN workspace: architect/engineer portal (program / model & standards / coordinate) -->
        <section id="ws-design" class="workspace">
          <div id="panel-portal-design" class="fullpanel"></div>
        </section>

        <!-- CONSTRUCTION workspace: full-width GC portal -->
        <section id="ws-construction" class="workspace">
          <div id="panel-portal" class="fullpanel"></div>
        </section>

        <!-- DEVELOPER workspace: real-estate portal (feasibility / market / capital / operations) -->
        <section id="ws-developer" class="workspace">
          <div id="panel-portal-dev" class="fullpanel"></div>
        </section>

        <!-- STUDIO workspace: visual computational node graph (Dynamo/Hypar-style) -->
        <section id="ws-studio" class="workspace">
          <div id="panel-studio" class="fullpanel active"></div>
        </section>

        <!-- FINANCE workspace: full-width proforma + portfolio roll-up -->
        <section id="ws-finance" class="workspace">
          <div id="fin-tabs" role="tablist" aria-label="Finance views">
            <button class="fintab active" data-fin="proforma" role="tab" aria-selected="true">Proforma</button>
            <button class="fintab" data-fin="portfolio" role="tab" aria-selected="false">Portfolio</button>
          </div>
          <div id="panel-proforma" class="fullpanel active"></div>
          <div id="panel-portfolio" class="fullpanel"></div>
        </section>
      </main>

      <footer id="statusbar"></footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
