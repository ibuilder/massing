server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # cross-origin isolation: required for web-ifc multithreaded WASM (SharedArrayBuffer)
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Embedder-Policy require-corp always;

    types { application/wasm wasm; }

    # long-cache hashed assets + the local WASM/worker (immutable)
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location /wasm/   { expires 1y; add_header Cache-Control "public, immutable"; }

    # never cache the HTML entry point, so a new build's asset hashes are picked up
    # immediately (prevents a stale bundle serving old JS after a rebuild)
    location = /index.html { add_header Cache-Control "no-cache"; }
    location / { try_files $uri $uri/ /index.html; }
}
