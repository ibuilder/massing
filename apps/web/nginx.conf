server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # cross-origin isolation: required for web-ifc multithreaded WASM (SharedArrayBuffer)
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Embedder-Policy require-corp always;

    # security headers (HSTS is ignored by browsers over plain http, so it's safe to always send;
    # TLS is terminated by the upstream LB in production). X-Content-Type-Options stops MIME sniffing.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    # compression. The Vite build emits precompressed .gz siblings (see vite.config.ts precompress
    # plugin), so gzip_static serves those directly for hashed JS/CSS/wasm — including the ~7 MB
    # thatopen chunk — with zero runtime CPU. gzip on (+ gzip_types) additionally compresses proxied
    # /api/ JSON, which has no precompressed sibling on disk. NOTE: brotli_static is intentionally NOT
    # set — the stock nginx:alpine image ships without the ngx_brotli module, so the directive would
    # fail to load. The .br siblings are still emitted; switch to a brotli-enabled image to serve them.
    gzip_static on;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript text/javascript application/json application/wasm image/svg+xml application/manifest+json;

    # NOTE: do NOT add a `types { ... }` block here — a server/location-level types
    # block REPLACES the whole inherited MIME map, leaving html/js/css as
    # application/octet-stream (the browser then downloads index.html instead of
    # rendering it). The default /etc/nginx/mime.types already maps wasm + html/js/css.

    # same-origin reverse proxy to the API service — the web client calls "/api/*"
    # in production so there's no cross-origin request and CORS never applies.
    location /api/ {
        proxy_pass http://api:8000/;           # trailing slash strips the /api prefix
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-User $http_x_user;  # forward the RBAC user header
        proxy_set_header Authorization $http_authorization;
        client_max_body_size 1024m;            # large IFC / model uploads
        proxy_read_timeout 300s;               # long conversions / analysis
    }

    # .mjs isn't in nginx's default mime map -> would serve as octet-stream, which
    # browsers reject for module/worker scripts. Force a JS MIME (regex wins over the
    # /assets/ prefix, so set the immutable cache here too).
    location ~* \.mjs$ { default_type text/javascript; expires 1y; add_header Cache-Control "public, immutable"; }
    # PWA manifest MIME (not in nginx's default map)
    location = /manifest.webmanifest { default_type application/manifest+json; }

    # long-cache hashed assets + the local WASM/worker (immutable)
    location /assets/ { expires 1y; add_header Cache-Control "public, immutable"; }
    location /wasm/   { expires 1y; add_header Cache-Control "public, immutable"; }

    # never cache the HTML entry point, so a new build's asset hashes are picked up
    # immediately. NOTE: a location with its own add_header does NOT inherit the
    # server-level ones, so COOP/COEP must be repeated here — cross-origin isolation
    # is set by the top-level document, and without it SharedArrayBuffer is disabled.
    location = /index.html {
        add_header Cross-Origin-Opener-Policy same-origin always;
        add_header Cross-Origin-Embedder-Policy require-corp always;
        # a location-level add_header drops the server-level ones, so repeat the security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Cache-Control "no-cache" always;
    }
    location / { try_files $uri $uri/ /index.html; }
}
