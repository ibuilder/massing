# Dev/self-host stack. The converter (Node) and APS worker are added in Phase 1;
# `web` is served as static built assets in prod. For local dev, run the web app with
# `npm run dev` instead of the `web` service.
version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bim
      POSTGRES_PASSWORD: bim
      POSTGRES_DB: bim
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bim"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./services/api
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://bim:bim@postgres:5432/bim
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    ports:
      - "8000:8000"
    profiles: ["full"]

  # converter:  # Phase 1 — Node worker (IFC→.frag). Added when implemented.
  #   build: ./services/converter
  #   depends_on: [minio]
  #   profiles: ["full"]

volumes:
  postgres-data:
  minio-data:
