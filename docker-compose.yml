# Self-host / prod stack. Boot the core with:  docker compose --profile full up --build
# Convert a model (job):       docker compose run --rm converter /data/model.ifc /data/model.frag
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bim
      POSTGRES_PASSWORD: bim
      POSTGRES_DB: bim
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bim"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql+psycopg://bim:bim@postgres:5432/bim
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: aec-bim
      AEC_RBAC: "${AEC_RBAC:-0}"           # set 1 to enforce project roles
      AEC_API_KEY: "${AEC_API_KEY:-}"
    ports: ["8000:8000"]
    profiles: ["full"]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on: [api]
    ports: ["8080:80"]
    profiles: ["full"]

  converter:
    build:
      context: .
      dockerfile: services/converter/Dockerfile
    volumes: ["./data:/data"]            # drop IFCs here; .frag written here
    profiles: ["tools"]                  # job-style: `docker compose run --rm converter ...`

volumes:
  postgres-data:
  minio-data:
