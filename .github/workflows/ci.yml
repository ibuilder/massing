name: CI

on:
  push:
    branches: [main]
  pull_request:

# least privilege: these jobs only read the repo
permissions:
  contents: read

jobs:
  api-tests:
    name: API test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      # system libs the scientific wheels expect (mirrors services/api/Dockerfile)
      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Python deps
        run: |
          python -m pip install --upgrade pip
          # B2: install the hash-pinned runtime lock (rejects substituted wheels); it covers the
          # data-service deps too (a strict subset). Dev-only tools install separately (unhashed).
          pip install --require-hashes -r services/api/requirements.lock
          pip install -r services/api/requirements-dev.txt

      - name: Lint (ruff — dead code + real defects)
        run: cd services/api && python -m ruff check src/ ../data/src/

      - name: Run test gate
        run: python services/api/run_tests.py

  web-build:
    name: Web typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      # this is an npm workspace (root lock); install at the root, then build the web workspace
      - name: Install
        run: npm ci

      # B1: the client parser + the two server-side .frag producers must pin the same fragments/web-ifc.
      - name: Fragments/web-ifc version guard
        run: node scripts/check-fragments-version.mjs

      - name: Lint (ESLint)
        run: npm run lint --workspace apps/web

      - name: Unit tests (Vitest)
        run: npm run test --workspace apps/web

      - name: Typecheck + build
        run: npm run build --workspace apps/web

      - name: Bundle-size budget (app shell)
        run: npm run budget --workspace apps/web

  # Container supply chain: build the deployable images, scan them, and (on main) publish to ghcr
  # with an immutable :sha tag so production can pin digests instead of pulling a mutable :latest.
  containers:
    name: Container build + scan + publish
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - { name: api, context: ., dockerfile: services/api/Dockerfile }
          - { name: web, context: ., dockerfile: apps/web/Dockerfile }
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ghcr.io/${{ github.repository }}-${{ matrix.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Vulnerability GATE: fixable CRITICAL findings block the publish. (O4 note: we tried gating on
      # HIGH too, but the base images — node's bundled npm CLI tooling and nginx:alpine's apk set —
      # carry a rolling wave of fixable HIGH CVEs we can't pin from here, which would keep the pipeline
      # red on churn outside our control. So CRITICAL blocks; HIGH is surfaced report-only below.)
      - name: Scan — gate (Trivy, CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}-${{ matrix.name }}:${{ github.sha }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      # Visibility (non-blocking): print fixable HIGH CVEs every build so they don't ship *silently* —
      # a human reviewing the run can act on ones in our own deps without the base-image noise blocking.
      - name: Scan — report HIGH (Trivy, non-blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}-${{ matrix.name }}:${{ github.sha }}
          severity: HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}-${{ matrix.name }}:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}-${{ matrix.name }}:${{ github.sha }} \
                     ghcr.io/${{ github.repository }}-${{ matrix.name }}:latest
          docker push ghcr.io/${{ github.repository }}-${{ matrix.name }}:latest
