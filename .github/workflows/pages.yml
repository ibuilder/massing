name: Deploy viewer demo to GitHub Pages

# Publishes the GitHub Pages site at https://<owner>.github.io/:
#   /            → the static landing page (docs/index.html)
#   /app/        → the *viewer-only* web app (no API — it streams the committed sample .frag tiles)
# VITE_PAGES=1 swaps the Workbox PWA SW for the coi-serviceworker so SharedArrayBuffer
# (needed by @thatopen/fragments) works on Pages, which can't set COOP/COEP headers itself.

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# allow only one in-flight Pages deploy; don't cancel a running one mid-publish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      # npm workspace: install at the root, then build the web workspace
      - name: Install
        run: npm ci

      - name: Build viewer demo
        run: npm run build --workspace apps/web
        env:
          VITE_PAGES: "1"
          VITE_BASE: "/app/"

      # assemble the Pages site: landing page at the root, viewer demo under /app/
      - name: Assemble site
        run: |
          mkdir -p _site/app
          cp -r docs/. _site/
          cp -r apps/web/dist/. _site/app/
          touch _site/.nojekyll
          echo massing.build > _site/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
