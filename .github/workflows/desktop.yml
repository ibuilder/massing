name: Desktop release

# Builds the Tauri 2 desktop shell (apps/web/src-tauri) for Windows, macOS, and Linux.
# Push a version tag (e.g. v0.1.0) to produce installers and attach them to a *draft*
# GitHub Release for review. A manual run (workflow_dispatch) just builds and uploads the
# bundles as workflow artifacts — no tag, no release — so you can smoke-test the toolchain.
#
# Builds are UNSIGNED. Code signing (Apple notarization / Windows Authenticode) is a
# follow-up that needs certificate secrets; see docs/deploy.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create/update the Release and upload assets

jobs:
  # Create the draft Release ONCE (tag pushes only). Without this, tauri-action runs in all three
  # matrix jobs and each creates its own draft when it doesn't yet see another — producing duplicate,
  # asset-split drafts for the same tag. The matrix below uploads to this single release id instead.
  create-release:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.mk.outputs.release_id }}
    steps:
      - id: mk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          # reuse an existing draft for this tag if one already exists, else create it
          id=$(gh api "repos/$REPO/releases" --paginate \
                 --jq ".[] | select(.tag_name==\"$TAG\" and .draft==true) | .id" | head -n1)
          if [ -z "$id" ]; then
            id=$(gh api -X POST "repos/$REPO/releases" \
                   -f tag_name="$TAG" -f name="Massing $TAG" \
                   -f body="Download the installer for your platform below." \
                   -F draft=true -F prerelease=false --jq .id)
          fi
          echo "release_id=$id" >> "$GITHUB_OUTPUT"
          echo "release id for $TAG: $id"

  build:
    needs: create-release
    # run even when create-release is skipped (workflow_dispatch builds without a release)
    if: ${{ always() && !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # arm64 (Apple Silicon). Per-arch (not universal) so the
            args: "--target aarch64-apple-darwin"   # PyInstaller sidecar's triple matches the bundle
            rust-targets: "aarch64-apple-darwin"
          - platform: ubuntu-22.04 # older glibc → broader Linux compatibility
            args: "--bundles deb,appimage" # skip rpm (no rpmbuild on the runner)
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      # The release version is the git tag (single source of truth). Write it into the version files
      # before building so binaries + latest.json carry the tag version — without this they were
      # frozen at whatever tauri.conf.json last said (0.1.52), and the auto-updater never advanced.
      - name: Sync version to tag
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          python - "$VER" <<'PY'
          import json, sys
          ver = sys.argv[1]
          for p in ("apps/web/package.json", "apps/web/src-tauri/tauri.conf.json"):
              d = json.load(open(p))
              d["version"] = ver
              json.dump(d, open(p, "w"), indent=2)
          print("synced version ->", ver)
          PY

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/web/src-tauri -> target

      # npm workspace: install at the root so the web build (beforeBuildCommand) has its deps
      - name: Install web dependencies
        run: npm ci

      # The desktop shell spawns a bundled Python backend ("aec-bim-server" sidecar). Build it
      # per-platform with PyInstaller and place it where tauri.conf's externalBin expects it.
      # (tauri-action runs beforeBuildCommand = `npm run build:desktop` to produce the SPA the
      # sidecar serves, so this only needs the Python side.)
      - uses: actions/setup-python@v6
        with:
          # 3.12 to match the CI + the pip-compiled lock (services/api/requirements.lock is generated
          # under 3.12 and pins numpy 2.5.x, which requires Python >= 3.12 — 3.11 can't resolve it).
          python-version: "3.12"

      - name: Build the backend sidecar
        shell: bash
        run: |
          python -m pip install --upgrade pip pyinstaller
          # Install from the unpinned input (NOT requirements.lock). The lock is resolved on Linux
          # (the prod image + CI), so it pins the Unix-only `uvloop` unconditionally and can't install
          # on Windows. requirements.in lets pip resolve per-platform — uvicorn[standard] correctly
          # drops uvloop on Windows, keeps it on macOS/Linux. Prod reproducibility stays on the hashed
          # lock in the API Docker image + the CI test gate; the desktop sidecar is a bundled binary.
          pip install -r services/api/requirements.in
          pip install -r services/data/requirements.txt
          # the SPA the sidecar serves (tauri-action also builds it, but the sidecar bundles a copy)
          npm --prefix apps/web run build:desktop
          python services/api/build_sidecar.py

      # Windows Authenticode: if a code-signing cert is configured, import the PFX and point
      # tauri.conf at its thumbprint so `tauri build` signs the .exe/.msi. No secret → unsigned.
      - name: Configure Windows signing
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $pfx = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $pw = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pw
          $conf = "apps/web/src-tauri/tauri.conf.json"
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          if (-not $json.bundle.windows) {
            $json.bundle | Add-Member -NotePropertyName windows -NotePropertyValue ([pscustomobject]@{}) -Force
          }
          $json.bundle.windows | Add-Member -NotePropertyName certificateThumbprint -NotePropertyValue $cert.Thumbprint -Force
          $json | ConvertTo-Json -Depth 32 | Set-Content $conf -Encoding utf8
          "Signing with thumbprint $($cert.Thumbprint)"

      # Sign the PyInstaller sidecar too — a signed Tauri shell isn't enough: Windows SmartScreen
      # inspects the embedded server binary separately, so an unsigned sidecar still warns on first
      # run. Uses the certificate imported above; no cert secret → step skipped (unsigned dev build).
      - name: Sign the backend sidecar (Windows)
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
        shell: pwsh
        run: |
          $sidecar = Get-ChildItem "apps/web/src-tauri/binaries/aec-bim-server-*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $sidecar) { Write-Host "no sidecar found to sign"; exit 0 }
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending | Select-Object -First 1
          & $signtool.FullName sign /a /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $sidecar.FullName
          "Signed $($sidecar.Name)"

      # macOS signing + notarization — only feed the Apple vars to the build when a cert secret is
      # actually configured. An EMPTY APPLE_CERTIFICATE is NOT a no-op: tauri-bundler still runs
      # `security import` on it and fails, so without this guard the unsigned macOS build breaks.
      # When the secrets are present, these export to the env tauri-action reads → signed + notarized.
      - name: Configure macOS signing
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for v in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            echo "$v=${!v}" >> "$GITHUB_ENV"
          done

      # Updater: only emit signed updater artifacts (+ latest.json) when a signing key is set.
      # createUpdaterArtifacts forces signing, so leave it off by default (keeps unsigned builds
      # green) and flip it on here only when the secret exists.
      - name: Enable updater artifacts
        if: env.TAURI_SIGNING_PRIVATE_KEY != ''
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          python -c "import json;p='apps/web/src-tauri/tauri.conf.json';d=json.load(open(p));d['bundle']['createUpdaterArtifacts']=True;json.dump(d,open(p,'w'),indent=2)"
          echo "updater artifacts enabled"

      - id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # signed self-update bundles (no-op when the secret is unset → createUpdaterArtifacts stays off)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/web
          # upload to the single draft created by create-release (tag pushes). On workflow_dispatch
          # that job is skipped → releaseId is empty → tauri-action builds without touching a release.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      # manual runs don't make a release; keep the installers as downloadable artifacts
      - name: Upload bundles as artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: aec-bim-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            apps/web/src-tauri/target/release/bundle/**
            apps/web/src-tauri/target/*/release/bundle/**

  # Publish the release automatically once EVERY platform bundle has been built + uploaded. `needs:
  # build` on a matrix job only reports success when all legs pass, so a single failed platform leaves
  # the release as a draft (never ship a partial, asset-split release to the auto-updater). This is the
  # step that was missing — builds attached installers to the draft but nothing flipped it live.
  publish-release:
    needs: [create-release, build]
    if: ${{ github.ref_type == 'tag' && needs.create-release.result == 'success' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the draft release (mark latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release edit "$TAG" --repo "$REPO" --draft=false --latest
          echo "published $TAG"
