name: Desktop release

# Builds the Tauri 2 desktop shell (apps/web/src-tauri) for Windows, macOS, and Linux.
# Push a version tag (e.g. v0.1.0) to produce installers and attach them to a *draft*
# GitHub Release for review. A manual run (workflow_dispatch) just builds and uploads the
# bundles as workflow artifacts — no tag, no release — so you can smoke-test the toolchain.
#
# Builds are UNSIGNED. Code signing (Apple notarization / Windows Authenticode) is a
# follow-up that needs certificate secrets; see docs/deploy.md.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create/update the Release and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # arm64 (Apple Silicon). Per-arch (not universal) so the
            args: "--target aarch64-apple-darwin"   # PyInstaller sidecar's triple matches the bundle
            rust-targets: "aarch64-apple-darwin"
          - platform: ubuntu-22.04 # older glibc → broader Linux compatibility
            args: "--bundles deb,appimage" # skip rpm (no rpmbuild on the runner)
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/web/src-tauri -> target

      # npm workspace: install at the root so the web build (beforeBuildCommand) has its deps
      - name: Install web dependencies
        run: npm ci

      # The desktop shell spawns a bundled Python backend ("aec-bim-server" sidecar). Build it
      # per-platform with PyInstaller and place it where tauri.conf's externalBin expects it.
      # (tauri-action runs beforeBuildCommand = `npm run build:desktop` to produce the SPA the
      # sidecar serves, so this only needs the Python side.)
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build the backend sidecar
        shell: bash
        run: |
          python -m pip install --upgrade pip pyinstaller
          pip install -r services/api/requirements.txt -r services/data/requirements.txt
          # the SPA the sidecar serves (tauri-action also builds it, but the sidecar bundles a copy)
          npm --prefix apps/web run build:desktop
          python services/api/build_sidecar.py

      # Windows Authenticode: if a code-signing cert is configured, import the PFX and point
      # tauri.conf at its thumbprint so `tauri build` signs the .exe/.msi. No secret → unsigned.
      - name: Configure Windows signing
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $pfx = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $pw = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pw
          $conf = "apps/web/src-tauri/tauri.conf.json"
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          if (-not $json.bundle.windows) {
            $json.bundle | Add-Member -NotePropertyName windows -NotePropertyValue ([pscustomobject]@{}) -Force
          }
          $json.bundle.windows | Add-Member -NotePropertyName certificateThumbprint -NotePropertyValue $cert.Thumbprint -Force
          $json | ConvertTo-Json -Depth 32 | Set-Content $conf -Encoding utf8
          "Signing with thumbprint $($cert.Thumbprint)"

      - id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization — tauri-action imports the cert and notarizes when these
          # are present; all are no-ops when the secrets are empty (build stays unsigned).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/web
          # release only on a tag push; a manual run leaves tagName empty → build, no release
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: "AEC BIM Platform __VERSION__"
          releaseBody: "Download the installer for your platform below."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # manual runs don't make a release; keep the installers as downloadable artifacts
      - name: Upload bundles as artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: aec-bim-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            apps/web/src-tauri/target/release/bundle/**
            apps/web/src-tauri/target/*/release/bundle/**
