name: Rust (desktop shell)

# O4 — the Tauri shell (apps/web/src-tauri) previously only compiled at release time (desktop.yml),
# so a bad lib.rs edit surfaced late. This runs clippy + fmt on PRs, but ONLY when the Rust changes
# (path filter) so it doesn't tax every unrelated PR.
on:
  push:
    paths: ["apps/web/src-tauri/**"]
  pull_request:
    paths: ["apps/web/src-tauri/**"]

permissions:
  contents: read

jobs:
  clippy-fmt:
    name: clippy + fmt
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: apps/web/src-tauri
    steps:
      - uses: actions/checkout@v7

      - name: Install Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/web/src-tauri -> target

      # tauri-build's build script validates that the externalBin sidecar
      # (binaries/aec-bim-server-<triple>) EXISTS before it will compile the crate. This lint-only job
      # doesn't build the heavy PyInstaller sidecar (that's desktop.yml), so stub an empty file with the
      # runner's target triple: clippy type-checks the Rust, it never bundles or runs the sidecar. Without
      # this the build script fails with "resource path … doesn't exist" and clippy/fmt never run.
      - name: Stub the sidecar binary (lint compiles the Rust, doesn't bundle the sidecar)
        run: |
          mkdir -p binaries
          triple="$(rustc -vV | sed -n 's/^host: //p')"
          touch "binaries/aec-bim-server-${triple}"
          chmod +x "binaries/aec-bim-server-${triple}"
          echo "stubbed binaries/aec-bim-server-${triple}"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
