name: Rust (desktop shell)

# O4 — the Tauri shell (apps/web/src-tauri) previously only compiled at release time (desktop.yml),
# so a bad lib.rs edit surfaced late. This runs clippy + fmt on PRs, but ONLY when the Rust changes
# (path filter) so it doesn't tax every unrelated PR.
on:
  push:
    paths: ["apps/web/src-tauri/**"]
  pull_request:
    paths: ["apps/web/src-tauri/**"]

jobs:
  clippy-fmt:
    name: clippy + fmt
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: apps/web/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/web/src-tauri -> target

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
