# One-shot (workflow_dispatch): generate apps/web/src-tauri/Cargo.lock and commit it to main.
# The lockfile pins the Tauri app's transitive Rust dependencies so desktop builds are
# deterministic — floating transitive deps have broken tagged releases before with no code change.
# Re-run manually after intentionally bumping Rust deps; Dependabot then keeps it fresh via PRs.
name: Generate Cargo.lock

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # tauri build deps (config parsing pulls in glib-sys etc. on Linux)
      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends
          libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Generate lockfile
        working-directory: apps/web/src-tauri
        run: cargo generate-lockfile

      - name: Commit Cargo.lock
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/src-tauri/Cargo.lock
          git diff --cached --quiet && { echo "lockfile unchanged"; exit 0; }
          git commit -m "chore(desktop): pin Rust dependencies with Cargo.lock" \
            -m "Deterministic desktop builds: transitive dep drift has broken tagged releases before with no code change. Generated by the cargo-lock workflow."
          git push
