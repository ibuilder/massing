# Alembic config for the Massing API (services/api).
#
# Migrations were introduced as the schema source-of-truth going forward (see migrations/README.md).
# NOTE: the DB URL is NOT set here — env.py reads it from the app's DATABASE_URL env var (same default
# as aec_api.db), so the migration path and the runtime always agree and no DSN is ever hardcoded.
[alembic]
script_location = migrations
prepend_sys_path = src
# migration filenames: <yyyy_mm_dd_HHMM>-<rev>_<slug>.py — sortable + human-readable
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
